local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads
locale: zh_Hans

collections:
  - name: blog
    label: 博客
    label_singular: 博客文章
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: description, widget: text }
      - { label: 日期, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - label: 分类
        name: category
        widget: select
        options:
          - 思想与经历
          - 技术文章
      - { label: 标签, name: tags, widget: list, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 正文, name: body, widget: markdown }

  - name: works
    label: 作品
    label_singular: 作品
    folder: src/content/works
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: 名称, name: title, widget: string }
      - { label: 简介, name: description, widget: text }
      - { label: 日期, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: 技术栈, name: technologies, widget: list, required: false }
      - { label: 代码仓库, name: repo, widget: string, required: false }
      - { label: 在线演示, name: demo, widget: string, required: false }
      - { label: 精选作品, name: featured, widget: boolean, default: false }
      - { label: 详情, name: body, widget: markdown, required: false }

  - name: site
    label: 站点信息
    files:
      - name: profile
        label: 联系信息
        file: src/content/site/profile.json
        fields:
          - { label: 姓名, name: name, widget: string }
          - { label: 首页标题, name: headline, widget: string }
          - { label: 个人介绍, name: bio, widget: text }
          - { label: 邮箱, name: email, widget: string }
          - { label: 电话, name: phone, widget: string }
          - { label: GitHub, name: github, widget: string }
